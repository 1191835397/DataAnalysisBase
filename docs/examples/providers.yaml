# 数据源 Provider 配置

version: "1.0"

providers:
  akshare:
    enabled: true
    priority: 2
    industry_mapping_path: industry_mapping.csv
    rate_limit:
      requests_per_minute: 30
      retry: 3
      retry_delay_sec: 2
    datasets:
      - market_spot
      - industry_mapping
      - daily_bars
      - valuation
      - financials
      - money_flow
      - news
      - fund_nav

  tushare:
    enabled: true
    priority: 1
    token_env: DAB_TUSHARE_TOKEN
    rate_limit:
      requests_per_minute: 200
    datasets:
      - industry_mapping
      - daily_bars
      - valuation
      - financials
      - money_flow
      - index
      - macro

  baostock:
    enabled: false
    priority: 4
    rate_limit:
      requests_per_minute: 60
    datasets:
      - industry_mapping

  cninfo:
    enabled: false  # M4 阶段启用
    priority: 1
    datasets:
      - announcements

  yfinance:
    enabled: false  # M6 阶段启用（港股/美股）
    priority: 2
    datasets:
      - daily_bars
      - valuation
