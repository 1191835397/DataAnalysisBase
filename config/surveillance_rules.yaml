version: "1.0"

dedupe:
  window_minutes: 30

rules:
  limit_up:
    scope: market
    severity: high
    condition: { field: change_pct, op: gte, value: 9.9 }
    enabled: true

  limit_down:
    scope: market
    severity: high
    condition: { field: change_pct, op: lte, value: -9.9 }
    enabled: true

  price_spike:
    scope: market
    severity: medium
    condition: { field: delta_price_pct, op: gte, value: 3.0 }
    enabled: true

  volume_surge:
    scope: market
    severity: medium
    condition: { field: volume_ratio, op: gte, value: 2.0 }
    enabled: true

  industry_move:
    scope: industry
    severity: info
    condition: { field: industry_change_pct_avg, op: abs_gte, value: 2.0 }
    enabled: true

  focus_price_drop:
    scope: focus
    severity: medium
    condition: { field: change_pct, op: lte, value: -5.0 }
    enabled: true
