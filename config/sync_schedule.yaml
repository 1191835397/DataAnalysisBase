version: "1.0"
timezone: "Asia/Shanghai"

holidays:
  - "2026-01-01"
  - "2026-01-02"
  - "2026-02-16"
  - "2026-02-17"
  - "2026-02-18"
  - "2026-02-19"
  - "2026-02-20"
  - "2026-02-23"
  - "2026-04-06"
  - "2026-05-01"
  - "2026-05-04"
  - "2026-05-05"
  - "2026-06-19"
makeup_trading_days: []

jobs:
  market_bulk_snapshot:
    description: 全 A 股批量现货快照
    interval_minutes: 30
    trading_sessions:
      - start: "09:30"
        end: "11:30"
      - start: "13:00"
        end: "15:00"
    trading_days_only: true
    on_complete: surveillance_eval

  focus_deep_sync:
    description: 重点股深度同步
    interval_minutes: 5
    trading_sessions:
      - start: "09:30"
        end: "11:30"
      - start: "13:00"
        end: "15:00"
    trading_days_only: true

  eod_daily_bars:
    cron: "35 15 * * 1-5"

  eod_master_data:
    cron: "40 15 * * 1-5"
